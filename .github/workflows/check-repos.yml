name: Repo Radar — Weekly Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install repo-radar
        run: pip install -e .

      - name: Re-check all repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER || 'claude' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          repo-radar check all
          repo-radar report

      - name: Commit updated reports
        run: |
          git config user.name  "repo-radar[bot]"
          git config user.email "repo-radar[bot]@users.noreply.github.com"
          git add data/ || true
          git diff --cached --quiet || git commit -m "chore: weekly radar update $(date -u +'%Y-%m-%d')"
          git push
